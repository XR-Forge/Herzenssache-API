openapi: 3.0.3
info:
  title: Ultimate Member WordPress Plugin REST API
  description: |
    REST API contract for a WordPress plugin exposing UltimateMember membership data.
    This API is intended for custom integrations that need to interact with UltimateMember users,
    profile fields, membership forms, role metadata, and form submissions.
  version: 1.0.0
servers:
  - url: https://example.com/wp-json/um/v1
    description: WordPress site REST API namespace for UltimateMember plugin
components:
  securitySchemes:
    wpNonce:
      type: apiKey
      in: header
      name: X-WP-Nonce
      description: WordPress nonce header for authenticated REST requests.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Optional bearer token for external application access.
  schemas:
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          example: rest_invalid_param
        message:
          type: string
          example: Invalid request parameters.
        data:
          type: object
          additionalProperties: true
    User:
      type: object
      properties:
        id:
          type: integer
          example: 123
        username:
          type: string
          example: jdoe
        email:
          type: string
          format: email
          example: jdoe@example.com
        display_name:
          type: string
          example: John Doe
        first_name:
          type: string
          example: John
        last_name:
          type: string
          example: Doe
        roles:
          type: array
          items:
            type: string
          example: ["subscriber", "um_member"]
        status:
          type: string
          description: UltimateMember user status or moderation state.
          example: active
        registration_date:
          type: string
          format: date-time
          example: 2025-11-06T14:19:00Z
        profile_url:
          type: string
          format: uri
          example: https://example.com/members/jdoe
        avatar_url:
          type: string
          format: uri
          example: https://example.com/wp-content/uploads/avatar.jpg
        meta:
          type: object
          description: Custom UltimateMember user meta or profile-values.
          additionalProperties: true
    Profile:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          properties:
            fields:
              type: object
              description: Key/value pairs for profile fields configured in UltimateMember.
              additionalProperties:
                type: string
              example:
                job_title: Senior Engineer
                location: Berlin
                biography: "Experienced developer and community mentor."
            member_since:
              type: string
              format: date
              example: 2022-03-01
    FieldDefinition:
      type: object
      properties:
        key:
          type: string
          example: um_first_name
        label:
          type: string
          example: First Name
        type:
          type: string
          example: text
        form_id:
          type: integer
          example: 12
        required:
          type: boolean
          example: true
        order:
          type: integer
          example: 1
        config:
          type: object
          description: Plugin-specific field configuration and metadata.
          additionalProperties: true
    Form:
      type: object
      properties:
        id:
          type: integer
          example: 7
        title:
          type: string
          example: Membership Registration
        type:
          type: string
          description: Form type as defined by UltimateMember, e.g. registration, login, profile.
          example: registration
        status:
          type: string
          example: published
        description:
          type: string
          example: Register for membership with custom profile fields.
        fields:
          type: array
          items:
            $ref: '#/components/schemas/FieldDefinition'
    Submission:
      type: object
      properties:
        id:
          type: integer
          example: 477
        form_id:
          type: integer
          example: 7
        user_id:
          type: integer
          nullable: true
          example: 123
        status:
          type: string
          example: pending
        created_at:
          type: string
          format: date-time
          example: 2026-04-19T12:34:56Z
        updated_at:
          type: string
          format: date-time
          example: 2026-04-20T08:10:00Z
        data:
          type: object
          description: Submitted field values from the form.
          additionalProperties: true
    Role:
      type: object
      properties:
        id:
          type: string
          example: subscriber
        label:
          type: string
          example: Subscriber
        capabilities:
          type: object
          additionalProperties:
            type: boolean
          example:
            read: true
            edit_posts: false
paths:
  /users:
    get:
      summary: List UltimateMember users
      description: Retrieve paginated UltimateMember users, including membership roles and profile summary fields.
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: role
          in: query
          schema:
            type: string
          description: Filter users by role.
      responses:
        '200':
          description: A list of UltimateMember users.
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                    example: 204
                  per_page:
                    type: integer
                    example: 20
                  page:
                    type: integer
                    example: 1
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create a new UltimateMember user
      description: Create a new WordPress user under UltimateMember management.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, email, password]
              properties:
                username:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                first_name:
                  type: string
                last_name:
                  type: string
                roles:
                  type: array
                  items:
                    type: string
                profile_fields:
                  type: object
                  additionalProperties:
                    type: string
      responses:
        '201':
          description: The created user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/{user_id}:
    parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: integer
    get:
      summary: Get an UltimateMember user
      responses:
        '200':
          description: User details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: User not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      summary: Update an UltimateMember user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                display_name:
                  type: string
                first_name:
                  type: string
                last_name:
                  type: string
                roles:
                  type: array
                  items:
                    type: string
                status:
                  type: string
                meta:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Updated user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete an UltimateMember user
      responses:
        '204':
          description: User deleted successfully.
        '404':
          description: User not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /profiles/{user_id}:
    parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: integer
    get:
      summary: Get UltimateMember profile data
      responses:
        '200':
          description: Profile details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
    patch:
      summary: Update UltimateMember profile fields
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name:
                  type: string
                profile_fields:
                  type: object
                  additionalProperties:
                    type: string
                meta:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Updated profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
  /fields:
    get:
      summary: List UltimateMember profile fields
      description: Retrieve all custom fields available in UltimateMember forms and profiles.
      responses:
        '200':
          description: List of field definitions.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FieldDefinition'
  /fields/{field_key}:
    parameters:
      - name: field_key
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Get field definition
      responses:
        '200':
          description: Single field definition.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FieldDefinition'
    patch:
      summary: Update an existing field definition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                label:
                  type: string
                required:
                  type: boolean
                order:
                  type: integer
                config:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Updated field definition.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FieldDefinition'
  /forms:
    get:
      summary: List UltimateMember forms
      responses:
        '200':
          description: List of available UltimateMember forms.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Form'
  /forms/{form_id}:
    parameters:
      - name: form_id
        in: path
        required: true
        schema:
          type: integer
    get:
      summary: Get a form definition
      responses:
        '200':
          description: Form details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Form'
  /forms/{form_id}/submissions:
    parameters:
      - name: form_id
        in: path
        required: true
        schema:
          type: integer
    get:
      summary: List submissions for a form
      description: Retrieve form submissions, optionally filtered by user or status.
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: status
          in: query
          schema:
            type: string
            example: pending
      responses:
        '200':
          description: Form submissions list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  page:
                    type: integer
                  per_page:
                    type: integer
                  submissions:
                    type: array
                    items:
                      $ref: '#/components/schemas/Submission'
    post:
      summary: Submit a form
      description: Create a new UltimateMember form submission.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                user_id:
                  type: integer
                data:
                  type: object
                  additionalProperties: true
      responses:
        '201':
          description: Created submission.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Submission'
  /submissions/{submission_id}:
    parameters:
      - name: submission_id
        in: path
        required: true
        schema:
          type: integer
    get:
      summary: Get submission details
      responses:
        '200':
          description: Submission details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Submission'
    delete:
      summary: Delete a form submission
      responses:
        '204':
          description: Submission deleted.
  /roles:
    get:
      summary: List membership roles
      description: Retrieve available WordPress/UltimateMember roles.
      responses:
        '200':
          description: Role list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Role'
  /roles/{role_id}:
    parameters:
      - name: role_id
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Get role metadata
      responses:
        '200':
          description: Role details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'
security:
  - wpNonce: []
  - bearerAuth: []
